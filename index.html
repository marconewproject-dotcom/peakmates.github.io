<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Peakmates</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0f172a;
  color:white;
}

/* NAVBAR */
.navbar {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#020617;
}

.navbar button {
  flex:1;
  padding:15px;
  background:none;
  border:none;
  color:white;
}

/* PAGE */
.page {
  display:none;
  padding:20px;
  padding-bottom:90px;
}

.active { display:block; }

/* CARD */
.card {
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
}

/* INPUT */
input, textarea, select {
  width:100%;
  padding:8px;
  margin-top:5px;
  border-radius:8px;
  border:none;
}

/* BUTTON */
button {
  background:#22c55e;
  border:none;
  padding:10px;
  border-radius:8px;
  margin-top:5px;
}

.badge {
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}

</style>
</head>

<body>

<!-- MAPPA -->
<div id="mappa" class="page active">
<h2>🗺️ Mappa</h2>
<div id="map" style="height:400px;"></div>
</div>

<!-- EVENTI -->
<div id="eventi" class="page">

<h2>📅 Eventi</h2>

<div id="adminPanel" class="card" style="display:none">
<h3>👑 Crea evento</h3>

<input id="title" placeholder="Nome evento">
<input id="date" placeholder="Data">
<input id="place" placeholder="Luogo">
<input id="meeting" placeholder="Punto di ritrovo">

<select id="difficulty">
<option>Principiante (facile)</option>
<option>Base</option>
<option>Intermedio</option>
<option>Avanzato</option>
<option>Esperto</option>
<option>Esperto con attrezzatura</option>
</select>

<select id="activity">
<option>Trekking</option>
<option>Bivacco</option>
<option>Ferrata</option>
<option>Scalata</option>
<option>Ghiacciaio</option>
<option>Passeggiata chill</option>
</select>

<select id="duration">
<option>Mezza giornata</option>
<option>1 giorno</option>
<option>2 giorni</option>
<option>Più giorni</option>
</select>

<select id="groupType">
<option>Gruppo aperto</option>
<option>Numero chiuso</option>
<option>Solo membri esperti</option>
</select>

<input id="participants" placeholder="Numero max partecipanti">

<textarea id="gear" placeholder="Attrezzatura richiesta"></textarea>
<textarea id="notes" placeholder="Note (facoltativo)"></textarea>

<p>📍 Seleziona posizione nella mappa</p>
<input id="lat" placeholder="Latitudine" readonly>
<input id="lng" placeholder="Longitudine" readonly>

<button onclick="createEvent()">Crea evento</button>
</div>

<div id="events"></div>
</div>

<!-- PROFILO -->
<div id="profilo" class="page">
<h2>👤 Profilo</h2>

<input id="username" placeholder="Nome">
<button onclick="login()">Salva</button>

<p id="welcome"></p>
</div>

<!-- NAVBAR -->
<div class="navbar">
<button onclick="showPage('mappa')">Mappa</button>
<button onclick="showPage('eventi')">Eventi</button>
<button onclick="showPage('profilo')">Profilo</button>
</div>

<!-- SCRIPT -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "peakmatesproject.firebaseapp.com",
  projectId: "peakmatesproject"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

const ADMIN_UID = "INSERISCI_QUI_UID";

let currentUser = null;
let username = "";

/* LOGIN */
function login(){
  username = document.getElementById("username").value;
  document.getElementById("welcome").innerText = "Ciao " + username;
}

/* AUTH */
auth.signInAnonymously();

auth.onAuthStateChanged(user => {
  currentUser = user;
  if(user && user.uid === ADMIN_UID){
    document.getElementById("adminPanel").style.display = "block";
  }
});

/* NAV */
function showPage(p){
  document.querySelectorAll(".page").forEach(el=>el.classList.remove("active"));
  document.getElementById(p).classList.add("active");
}

/* MAPPA */
let map = L.map('map').setView([45.9, 9.4], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* CLICK MAPPA */
map.on('click', function(e){
  lat.value = e.latlng.lat;
  lng.value = e.latlng.lng;
});

/* CREA EVENTO */
function createEvent(){
  if(currentUser.uid !== ADMIN_UID){
    alert("Non autorizzato");
    return;
  }

  db.collection("events").add({
    title: title.value,
    date: date.value,
    place: place.value,
    meeting: meeting.value,
    difficulty: difficulty.value,
    activity: activity.value,
    duration: duration.value,
    groupType: groupType.value,
    max: participants.value,
    gear: gear.value,
    notes: notes.value,
    lat: parseFloat(lat.value),
    lng: parseFloat(lng.value),
    people: []
  });
}

/* EVENTI */
db.collection("events").onSnapshot(snapshot => {
  events.innerHTML = "";

  snapshot.forEach(doc => {
    const e = doc.data();

    if(e.lat && e.lng){
      L.marker([e.lat, e.lng]).addTo(map).bindPopup(e.title);
    }

    events.innerHTML += `
    <div class="card">
      <h3>${e.title}</h3>
      <p>📍 ${e.place}</p>
      <p>🧭 Ritrovo: ${e.meeting}</p>
      <p>📅 ${e.date}</p>
      <p>🏔️ ${e.activity}</p>
      <p>📊 ${e.difficulty}</p>
      <p>⏱️ ${e.duration}</p>
      <p>👥 ${e.groupType}</p>
      <p>🎒 ${e.gear}</p>
      <p>📝 ${e.notes || "-"}</p>
      <p>👤 ${e.people.length}/${e.max}</p>

      <input id="name-${doc.id}" placeholder="Nome">
      <button onclick="joinEvent('${doc.id}', ${e.max})">Partecipa</button>

      <h4>Chat</h4>
      <input id="msg-${doc.id}">
      <button onclick="sendMessage('${doc.id}')">Invia</button>
      <div id="chat-${doc.id}"></div>
    </div>
    `;

    db.collection("events").doc(doc.id).collection("chat")
    .orderBy("time")
    .onSnapshot(chatSnap => {
      const box = document.getElementById(`chat-${doc.id}`);
      if(!box) return;

      box.innerHTML = "";
      chatSnap.forEach(m=>{
        let d = m.data();
        box.innerHTML += `<p><b>${d.user}:</b> ${d.text}</p>`;
      });
    });

  });
});

/* JOIN */
function joinEvent(id, max){
  const name = document.getElementById(`name-${id}`).value || username || "Anonimo";

  db.collection("events").doc(id).get().then(doc=>{
    let d = doc.data();

    if(d.people.length >= max){
      alert("Posti finiti");
      return;
    }

    d.people.push(name);

    db.collection("events").doc(id).update({
      people: d.people
    });
  });
}

/* CHAT */
function sendMessage(id){
  const text = document.getElementById(`msg-${id}`).value;

  db.collection("events").doc(id).collection("chat").add({
    text: text,
    user: username || "Anonimo",
    time: Date.now()
  });
}
</script>

</body>
</html>
