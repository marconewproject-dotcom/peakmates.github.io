<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Peakmates</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(to bottom, #052e16, #0f172a);
  color: #f1f5f9;
}

/* HEADER */
header {
  padding: 20px;
  text-align: center;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
}

/* HERO */
.hero {
  padding: 80px 20px;
  text-align: center;
  background-image: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470');
  background-size: cover;
  background-position: center;
}

.hero h1 {
  font-size: 42px;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 18px;
  margin-top: 18px;
  border-radius: 16px;
  backdrop-filter: blur(10px);
  animation: fadeUp 0.6s ease;
}

/* INPUT */
input, select, textarea {
  width: 100%;
  margin: 6px 0;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

/* BUTTON */
button {
  padding: 10px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
  background: #16a34a;
}

/* BADGE */
.badge {
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
}

.facile { background: green; }
.medio { background: orange; }
.difficile { background: red; }

/* ANIMAZIONE */
@keyframes fadeUp {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<header>
  <h2>🏔️ Peakmates</h2>
</header>

<div class="hero">
  <h1>Vivi la montagna. Insieme.</h1>
  <p>Trekking • Bivacchi • Ferrate • Scalate</p>
</div>

<div class="container">

<!-- LOGIN -->
<div class="card">
<h3>Accedi</h3>
<input id="username" placeholder="Nome">
<button onclick="login()">Entra</button>
</div>

<!-- ADMIN -->
<div class="card" id="adminPanel" style="display:none">
<h3>👑 Crea evento</h3>

<input id="title" placeholder="Nome evento">
<input id="date" placeholder="Data">
<input id="place" placeholder="Luogo">

<select id="difficulty">
<option value="facile">Facile</option>
<option value="medio">Medio</option>
<option value="difficile">Difficile</option>
</select>

<input id="participants" placeholder="Numero max">
<textarea id="gear" placeholder="Attrezzatura"></textarea>

<button onclick="createEvent()">Crea evento</button>
</div>

<h2>📅 Eventi</h2>
<div id="events"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script>

/* CONFIG FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDwIspMkTPdAdMFQxLx_XxPJ8v6aD-vdZg",
  authDomain: "peakmatesproject.firebaseapp.com",
  projectId: "peakmatesproject",
  storageBucket: "peakmatesproject.firebasestorage.app",
  messagingSenderId: "618363119140",
  appId: "1:618363119140:web:e9df3486167407e1af9ab1"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

/* ADMIN UID (INSERISCI DOPO) */
const ADMIN_UID = "INSERISCI_QUI_UID";

/* UTENTE */
let currentUser = null;
let username = "";

/* LOGIN ANONIMO AUTOMATICO */
auth.signInAnonymously();

/* CONTROLLO UTENTE */
auth.onAuthStateChanged(user => {
  currentUser = user;

  if(user && user.uid === ADMIN_UID){
    document.getElementById("adminPanel").style.display = "block";
  }
});

/* LOGIN NOME */
function login(){
  username = document.getElementById("username").value;
  alert("Benvenuto " + username);
}

/* CREA EVENTO */
function createEvent(){
  if(currentUser.uid !== ADMIN_UID){
    alert("Non autorizzato");
    return;
  }

  db.collection("events").add({
    title: title.value,
    date: date.value,
    place: place.value,
    difficulty: difficulty.value,
    max: participants.value,
    gear: gear.value,
    people: []
  });
}

/* CARICA EVENTI */
db.collection("events").onSnapshot(snapshot => {
  const container = document.getElementById("events");
  container.innerHTML = "";

  snapshot.forEach(doc => {
    const e = doc.data();

    container.innerHTML += `
    <div class="card">
      <h3>${e.title}</h3>
      <p>📍 ${e.place}</p>
      <p>📅 ${e.date}</p>

      <span class="badge ${e.difficulty}">
        ${e.difficulty.toUpperCase()}
      </span>

      <p>🎒 ${e.gear}</p>
      <p>👥 ${e.people.length}/${e.max}</p>

      <input placeholder="Nome" id="name-${doc.id}">
      <button onclick="joinEvent('${doc.id}', ${e.max})">
        Partecipa
      </button>

      <p>${e.people.join(", ")}</p>
    </div>
    `;
  });
});

/* PARTECIPA */
function joinEvent(id, max){
  const name = document.getElementById(`name-${id}`).value || username || "Anonimo";

  db.collection("events").doc(id).get().then(doc => {
    let data = doc.data();

    if(data.people.length >= max){
      alert("Posti finiti");
      return;
    }

    data.people.push(name);

    db.collection("events").doc(id).update({
      people: data.people
    });
  });
}

</script>

</body>
</html>
