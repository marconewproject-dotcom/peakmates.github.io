<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Peakmates</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(to bottom, #052e16, #0f172a);
  color: #f1f5f9;
}

/* HEADER */
header {
  padding: 25px;
  text-align: center;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(12px);
}

.hero {
  padding: 60px 20px;
  text-align: center;
}

.hero h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

.hero p {
  opacity: 0.8;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 18px;
  margin-top: 18px;
  border-radius: 16px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-4px);
}

/* INPUT */
input, select, textarea {
  width: 100%;
  margin: 6px 0;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

/* BUTTON */
button {
  padding: 10px 14px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

/* BADGE */
.badge {
  display: inline-block;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
  margin-top: 5px;
}

.facile { background: #16a34a; }
.medio { background: #eab308; }
.difficile { background: #dc2626; }

</style>
</head>

<body>

<header>
  <h2>🏔️ Peakmates</h2>
</header>

<div class="hero">
  <h1>Vivi la montagna. Insieme.</h1>
  <p>Bivacchi • Trekking • Ferrate • Ghiacciai • Scalate</p>
</div>

<div class="container">

<!-- ADMIN PANEL -->
<div class="card">
  <h3>👑 Crea evento (admin)</h3>

  <input id="title" placeholder="Nome evento">
  <input id="date" placeholder="Data">
  <input id="place" placeholder="Luogo">

  <select id="difficulty">
    <option value="facile">Facile</option>
    <option value="medio">Medio</option>
    <option value="difficile">Difficile</option>
  </select>

  <input id="participants" placeholder="Numero max partecipanti">
  <textarea id="gear" placeholder="Attrezzatura"></textarea>

  <button onclick="createEvent()">Crea evento</button>
</div>

<!-- EVENTI -->
<h2>📅 Eventi</h2>
<div id="events"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>

/* CONFIG FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDwIspMkTPdAdMFQxLx_XxPJ8v6aD-vdZg",
  authDomain: "peakmatesproject.firebaseapp.com",
  projectId: "peakmatesproject",
  storageBucket: "peakmatesproject.firebasestorage.app",
  messagingSenderId: "618363119140",
  appId: "1:618363119140:web:e9df3486167407e1af9ab1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* CREA EVENTO */
function createEvent() {
  db.collection("events").add({
    title: title.value,
    date: date.value,
    place: place.value,
    difficulty: difficulty.value,
    max: participants.value,
    gear: gear.value,
    people: []
  });
}

/* CARICA EVENTI */
db.collection("events").onSnapshot(snapshot => {
  const container = document.getElementById("events");
  container.innerHTML = "";

  snapshot.forEach(doc => {
    const e = doc.data();

    container.innerHTML += `
    <div class="card">
      <h3>${e.title}</h3>
      <p>📍 ${e.place}</p>
      <p>📅 ${e.date}</p>

      <span class="badge ${e.difficulty}">
        ${e.difficulty.toUpperCase()}
      </span>

      <p>🎒 ${e.gear}</p>
      <p>👥 ${e.people.length} / ${e.max}</p>

      <input placeholder="Il tuo nome" id="name-${doc.id}">
      <button onclick="joinEvent('${doc.id}', ${e.max})">
        Partecipa
      </button>

      <p><b>Partecipanti:</b><br>
      ${e.people.map(p => p).join("<br>")}</p>
    </div>
    `;
  });
});

/* JOIN EVENT */
function joinEvent(id, max) {
  const name = document.getElementById(`name-${id}`).value;

  db.collection("events").doc(id).get().then(doc => {
    let data = doc.data();

    if(data.people.length >= max){
      alert("Posti finiti");
      return;
    }

    data.people.push(name);

    db.collection("events").doc(id).update({
      people: data.people
    });
  });
}

</script>

</body>
</html>
