<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Peakmates</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(to bottom, #052e16, #0f172a);
  color: #f1f5f9;
}

header {
  padding: 20px;
  text-align: center;
  background: rgba(0,0,0,0.4);
}

.hero {
  padding: 80px 20px;
  text-align: center;
  background-image: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470');
  background-size: cover;
  background-position: center;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.06);
  padding: 18px;
  margin-top: 18px;
  border-radius: 16px;
  animation: fadeUp 0.5s ease;
}

input, select, textarea {
  width: 100%;
  margin: 6px 0;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  transform: scale(1.05);
}

.badge { padding:4px 8px; border-radius:6px; }
.facile { background:green; }
.medio { background:orange; }
.difficile { background:red; }

@keyframes fadeUp {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<header>
<h2>🏔️ Peakmates</h2>
</header>

<div class="hero">
<h1>Vivi la montagna insieme</h1>
</div>

<div id="map" style="height:300px;"></div>

<div class="container">

<div class="card">
<h3>Login</h3>
<input id="username" placeholder="Nome">
<button onclick="login()">Entra</button>
</div>

<div class="card" id="adminPanel" style="display:none">
<h3>👑 Crea evento</h3>

<input id="title" placeholder="Nome evento">
<input id="date" placeholder="Data">
<input id="place" placeholder="Luogo">

<select id="difficulty">
<option value="facile">Facile</option>
<option value="medio">Medio</option>
<option value="difficile">Difficile</option>
</select>

<input id="participants" placeholder="Numero max">
<textarea id="gear" placeholder="Attrezzatura"></textarea>

<input id="lat" placeholder="Latitudine">
<input id="lng" placeholder="Longitudine">

<button onclick="createEvent()">Crea evento</button>
</div>

<h2>Eventi</h2>
<div id="events"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDwIspMkTPdAdMFQxLx_XxPJ8v6aD-vdZg",
  authDomain: "peakmatesproject.firebaseapp.com",
  projectId: "peakmatesproject",
  storageBucket: "peakmatesproject.firebasestorage.app",
  messagingSenderId: "618363119140",
  appId: "1:618363119140:web:e9df3486167407e1af9ab1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

const ADMIN_UID = "INSERISCI_QUI_UID";

let currentUser = null;
let username = "";

/* LOGIN ANONIMO */
auth.signInAnonymously();

auth.onAuthStateChanged(user => {
  currentUser = user;

  if(user && user.uid === ADMIN_UID){
    document.getElementById("adminPanel").style.display = "block";
  }
});

/* LOGIN NOME */
function login(){
  username = document.getElementById("username").value;
  alert("Benvenuto " + username);
}

/* MAPPA */
let map = L.map('map').setView([45.9, 9.4], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* CREA EVENTO */
function createEvent(){
  if(currentUser.uid !== ADMIN_UID){
    alert("Non autorizzato");
    return;
  }

  db.collection("events").add({
    title: title.value,
    date: date.value,
    place: place.value,
    difficulty: difficulty.value,
    max: participants.value,
    gear: gear.value,
    lat: parseFloat(lat.value),
    lng: parseFloat(lng.value),
    people: []
  });
}

/* CARICA EVENTI */
db.collection("events").onSnapshot(snapshot => {
  const container = document.getElementById("events");
  container.innerHTML = "";

  snapshot.forEach(doc => {
    const e = doc.data();

    if(e.lat && e.lng){
      L.marker([e.lat, e.lng]).addTo(map).bindPopup(e.title);
    }

    container.innerHTML += `
    <div class="card">
      <h3>${e.title}</h3>
      <p>${e.place} - ${e.date}</p>
      <span class="badge ${e.difficulty}">${e.difficulty}</span>
      <p>${e.gear}</p>
      <p>${e.people.length}/${e.max}</p>

      <input id="name-${doc.id}" placeholder="Nome">
      <button onclick="joinEvent('${doc.id}', ${e.max})">Partecipa</button>

      <div>${e.people.join(", ")}</div>

      <h4>Chat</h4>
      <input id="msg-${doc.id}" placeholder="Messaggio">
      <button onclick="sendMessage('${doc.id}')">Invia</button>
      <div id="chat-${doc.id}"></div>
    </div>
    `;

    db.collection("events")
      .doc(doc.id)
      .collection("chat")
      .orderBy("time")
      .onSnapshot(chatSnap => {
        const chatBox = document.getElementById(`chat-${doc.id}`);
        if(!chatBox) return;
        chatBox.innerHTML = "";

        chatSnap.forEach(msg => {
          const m = msg.data();
          chatBox.innerHTML += `<p><b>${m.user}:</b> ${m.text}</p>`;
        });
      });

  });
});

/* JOIN */
function joinEvent(id, max){
  const name = document.getElementById(`name-${id}`).value || username || "Anonimo";

  db.collection("events").doc(id).get().then(doc => {
    let data = doc.data();

    if(data.people.length >= max){
      alert("Posti finiti");
      return;
    }

    data.people.push(name);

    db.collection("events").doc(id).update({
      people: data.people
    });
  });
}

/* CHAT */
function sendMessage(eventId){
  const text = document.getElementById(`msg-${eventId}`).value;

  db.collection("events")
    .doc(eventId)
    .collection("chat")
    .add({
      text: text,
      user: username || "Anonimo",
      time: Date.now()
    });
}
</script>

</body>
</html>
